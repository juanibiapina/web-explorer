name: Sync Secrets

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Push secrets to Cloudflare
        run: |
          echo "$TAVILY_API_KEY" | npx wrangler secret put TAVILY_API_KEY --config apps/worker/wrangler.jsonc
          echo "$ZAI_API_KEY" | npx wrangler secret put ZAI_API_KEY --config apps/worker/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}

      - name: Smoke test
        run: ./scripts/smoke-test.sh https://web-explorer.juanibiapina.workers.dev --deep
